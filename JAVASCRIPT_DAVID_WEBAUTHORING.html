<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Page Title</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #0f172a, #1e3c72);
            color: white;
            text-align: center;
        }

        .container {
            width: 100%;
            height: 200px;
            display: flex;
            justify-content: center;
            align-items: center;
            background: rgba(0,0,0,0.2);
        }

        p {
            font-size: 22px;
            font-weight: bold;
            text-shadow: 2px 2px 6px rgba(0,0,0,0.5);
        }

        #text-color-red {
            background: rgba(255,255,255,0.1);
            padding: 10px 20px;
            border-radius: 12px;
            display: inline-block;
        }

        #text-underline {
            color: #ffd700;
        }

        .video-border {
            border: 3px solid #ff3b3b;
            background: linear-gradient(135deg, #ff4d4d, #4d79ff);
            padding: 10px;
            border-radius: 18px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            margin-top: 20px;
        }

        audio {
            width: 180px;
        }

        /* TABLE DESIGN */
        .table {
            width: 90%;
            margin: 30px auto;
            border-collapse: collapse;
            background: white;
            color: black;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 8px 25px rgba(0,0,0,0.3);
        }

        .table th {
            background: linear-gradient(90deg, #1e3c72, #2a5298);
            color: white;
            padding: 14px;
            font-size: 16px;
        }

        .table td {
            padding: 12px;
            border-bottom: 1px solid #ddd;
            text-align: center;
        }

        .table tr:hover {
            background-color: #f1f5ff;
            transition: 0.3s;
        }

        .table th:hover {
            background: #0033cc;
        }
    </style>
</head>

<body>

    <div class="container">
    </div>

    <p id="text-color-red">ISHOWSPEED</p>
    <p id="text-underline">WORLD CUP 2026 BEST SONG OF THE FIFA YEAR</p>

    <video class="video-border" width="900" height="450" controls>
        <source src="video.mp4" type="video/mp4">
    </video>

    <table class="table" border="1">
        <tr>
            <th>No.</th>
            <th>Artist</th>
            <th>Album</th>
            <th>Song</th>
            <th>Play</th>
        </tr>

        <tr>
            <td>1</td>
            <td>iShowSpeed</td>
            <td>FIFA WORLD CUP</td>
            <td>WORLDCUP 2026</td>
            <td>
                <audio controls>
                    <source src="sound.mp3" type="audio/mpeg">
                </audio>
            </td>
        </tr>
    </table>

    <script>
        alert('Hello World');
        document.getElementById("text-color-red").style.color = "red";
        document.getElementById("text-underline").style.textDecoration = "underline";
    </script>

</body>
</html>
